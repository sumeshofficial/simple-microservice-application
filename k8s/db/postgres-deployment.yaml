apiVersion: apps/v1

kind: Deployment

metadata:
  name: postgres

spec:
  selector:
    matchLabels:
      app: "postgres"

  template:
    metadata:
      labels:
        app: "postgres"
    
    spec:
      containers:
        - name: postgres
          image: postgres:17

          ports:
            - containerPort: 5432

          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: ms-demo-secrets
                  key: POSTGRES_USER

            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ms-demo-secrets
                  key: POSTGRES_PASSWORD

            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: ms-demo-secrets
                  key: POSTGRES_DB