name: CI/CD

on:
  push:
    branches:
      - main

jobs:
  # 1. Parallel Build and Push using Matrix Strategy
  build-and-push:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [api-gateway, user-service, order-service]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ms-demo-${{ matrix.service }}:${{ github.sha }}
          no-cache: true
  
  # 2. Automated Deployment to Kubernetes
  deploy:
    needs: build-and-push

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Update Kubeconfig
        run: |
          aws eks update-kubeconfig --region ap-south-1 --name ms-demo-cluster

      - name: Create Kubernetes Secret
        run: |
          kubectl create secret generic ms-demo-secrets \
            --from-literal=JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            --from-literal=MONGODB_URI="${{ secrets.MONGODB_URI }}" \
            --from-literal=DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            --from-literal=POSTGRES_USER="${{ secrets.POSTGRES_USER }}" \
            --from-literal=POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}" \
            --from-literal=POSTGRES_DB="${{ secrets.POSTGRES_DB }}" \
            --dry-run=client -o yaml | kubectl apply -f - --validate=false

      - name: Update Image Tags in Manifests
        run: |
          kubectl set image deployment/user-deployment \
            user-service=${{ secrets.DOCKER_USERNAME }}/ms-demo-user-service:${{ github.sha }}

          kubectl set image deployment/order-deployment \
            order-service=${{ secrets.DOCKER_USERNAME }}/ms-demo-order-service:${{ github.sha }}

          kubectl set image deployment/gateway-deployment \
            gateway-service=${{ secrets.DOCKER_USERNAME }}/ms-demo-api-gateway:${{ github.sha }}

      - name: Apply Kubernetes Manifests
        run: |
          kubectl apply -f k8s/db/ --validate=false
          kubectl apply -f k8s/user/ --validate=false
          kubectl apply -f k8s/order/ --validate=false
          kubectl apply -f k8s/api-gateway/ --validate=false
          kubectl apply -f k8s/ingress/

      - name: Wait for Rollout
        run: |
          kubectl rollout status deployment/user-deployment --timeout=180s
          kubectl rollout status deployment/order-deployment --timeout=180s
          kubectl rollout status deployment/gateway-deployment --timeout=180s

      - name: Rollback on Failure
        if: failure()
        run: |
          echo "Deployment failed! Rolling back to previous version..."

          kubectl rollout undo deployment/user-deployment
          kubectl rollout undo deployment/order-deployment
          kubectl rollout undo deployment/gateway-deployment

          kubectl rollout status deployment/user-deployment --timeout=180s
          kubectl rollout status deployment/order-deployment --timeout=180s
          kubectl rollout status deployment/gateway-deployment --timeout=180s




