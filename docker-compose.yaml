services:
  user-service:
    build: ./user-service
    container_name: user-service

    ports:
      - "3001:3001"

    env_file: 
      - ./user-service/.env

    depends_on: 
      - mongodb

  mongodb:
    image: mongo
    container_name: mongodb

    restart: always

    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data: